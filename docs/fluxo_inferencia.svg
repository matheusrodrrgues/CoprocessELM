<svg width="680" height="620" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ENTRADA -->
  <rect x="190" y="20" width="300" height="48" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.8"/>
  <text x="340" y="40" text-anchor="middle" font-size="14" font-weight="600" fill="#2c2c2a">Imagem de entrada</text>
  <text x="340" y="58" text-anchor="middle" font-size="12" fill="#5f5e5a">784 pixels · Q4.12 · WIDTH=16</text>
  <line x1="340" y1="68" x2="340" y2="98" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- BINARIZAÇÃO -->
  <rect x="190" y="98" width="300" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="340" y="119" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">Binarização</text>
  <text x="340" y="138" text-anchor="middle" font-size="12" fill="#0f6e56">pixel ≥ 1536 → 4095 · pixel &lt; 1536 → 0</text>
  <line x1="340" y1="154" x2="340" y2="184" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- CAMADA OCULTA -->
  <rect x="120" y="184" width="440" height="116" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
  <text x="340" y="208" text-anchor="middle" font-size="14" font-weight="600" fill="#26215c">Camada oculta — 128 neurônios</text>
  <text x="340" y="228" text-anchor="middle" font-size="12" fill="#534ab7">Σ pixel[i] × W[h][i]  →  784 MACs por neurônio</text>
  <text x="340" y="248" text-anchor="middle" font-size="12" fill="#534ab7">+ bias[h]  →  soma_oculta</text>
  <text x="340" y="268" text-anchor="middle" font-size="12" fill="#534ab7">→ sigmoid(x)  →  h_mem[h]  (salvo em registrador)</text>
  <text x="72" y="242" text-anchor="middle" font-size="12" fill="#888780">repete</text>
  <text x="72" y="256" text-anchor="middle" font-size="12" fill="#888780">128×</text>
  <line x1="340" y1="300" x2="340" y2="330" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- CAMADA DE SAÍDA -->
  <rect x="120" y="330" width="440" height="96" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.8"/>
  <text x="340" y="354" text-anchor="middle" font-size="14" font-weight="600" fill="#4a1b0c">Camada de saída — 10 classes</text>
  <text x="340" y="374" text-anchor="middle" font-size="12" fill="#993c1d">Σ h[i] × β[k][i]  →  128 MACs por classe</text>
  <text x="340" y="394" text-anchor="middle" font-size="12" fill="#993c1d">→ y_mem[k]  (score de cada dígito)</text>
  <text x="72" y="374" text-anchor="middle" font-size="12" fill="#888780">repete</text>
  <text x="72" y="388" text-anchor="middle" font-size="12" fill="#888780">10×</text>
  <line x1="340" y1="426" x2="340" y2="456" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ARGMAX -->
  <rect x="190" y="456" width="300" height="56" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.8"/>
  <text x="340" y="476" text-anchor="middle" font-size="14" font-weight="600" fill="#412402">Argmax</text>
  <text x="340" y="496" text-anchor="middle" font-size="12" fill="#854f0b">índice do maior y_mem[0..9]</text>
  <line x1="340" y1="512" x2="340" y2="542" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- SAÍDA FINAL -->
  <rect x="190" y="542" width="300" height="56" rx="8" fill="#f1efe8" stroke="#888780" stroke-width="0.8"/>
  <text x="340" y="562" text-anchor="middle" font-size="14" font-weight="600" fill="#2c2c2a">Predição final (0 – 9)</text>
  <text x="340" y="580" text-anchor="middle" font-size="12" fill="#5f5e5a">LEDR[3:0]  ·  HEX0  ·  result_out[3:0]</text>
</svg>
