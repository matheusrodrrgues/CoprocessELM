<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- RESET -->
  <text x="340" y="26" text-anchor="middle" font-size="12" fill="#888780">reset</text>
  <line x1="340" y1="32" x2="340" y2="62" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- IDLE -->
  <rect x="240" y="62" width="200" height="56" rx="8" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.8"/>
  <text x="340" y="84" text-anchor="middle" font-size="14" font-weight="600" fill="#085041">IDLE</text>
  <text x="340" y="104" text-anchor="middle" font-size="12" fill="#0f6e56">aguardando comando</text>

  <!-- IDLE → BUSY seta principal -->
  <line x1="340" y1="118" x2="340" y2="208" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="354" y="153" font-size="12" fill="#444441">CMD_START</text>
  <text x="354" y="168" font-size="12" fill="#444441">(flags ok)</text>

  <!-- IDLE ← BUSY seta lateral esquerda (STORE) -->
  <path d="M240 145 L162 145 L162 238 L240 238" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dash)"/>
  <text x="100" y="196" text-anchor="middle" font-size="12" fill="#888780">CMD_</text>
  <text x="100" y="210" text-anchor="middle" font-size="12" fill="#888780">STORE_*</text>

  <!-- BUSY -->
  <rect x="240" y="208" width="200" height="56" rx="8" fill="#faeeda" stroke="#854f0b" stroke-width="0.8"/>
  <text x="340" y="228" text-anchor="middle" font-size="14" font-weight="600" fill="#412402">BUSY</text>
  <text x="340" y="248" text-anchor="middle" font-size="12" fill="#854f0b">inferência em execução</text>

  <!-- BUSY → DONE seta principal -->
  <line x1="340" y1="264" x2="340" y2="344" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="354" y="300" font-size="12" fill="#444441">inferência</text>
  <text x="354" y="315" font-size="12" fill="#444441">concluída</text>

  <!-- DONE -->
  <rect x="240" y="344" width="200" height="56" rx="8" fill="#eeedfe" stroke="#534ab7" stroke-width="0.8"/>
  <text x="340" y="364" text-anchor="middle" font-size="14" font-weight="600" fill="#26215c">DONE</text>
  <text x="340" y="384" text-anchor="middle" font-size="12" fill="#534ab7">resultado disponível</text>

  <!-- DONE → BUSY seta lateral direita (CMD_START) -->
  <path d="M440 372 L518 372 L518 236 L440 236" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dash)"/>
  <text x="562" y="302" text-anchor="middle" font-size="12" fill="#888780">CMD_</text>
  <text x="562" y="316" text-anchor="middle" font-size="12" fill="#888780">START</text>

  <!-- DONE → ERROR seta principal -->
  <line x1="340" y1="400" x2="340" y2="440" stroke="#555" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="354" y="424" font-size="12" fill="#444441">CMD_CLEAR_ERR</text>

  <!-- ERROR -->
  <rect x="240" y="440" width="200" height="56" rx="8" fill="#faece7" stroke="#993c1d" stroke-width="0.8"/>
  <text x="340" y="460" text-anchor="middle" font-size="14" font-weight="600" fill="#4a1b0c">ERROR</text>
  <text x="340" y="480" text-anchor="middle" font-size="12" fill="#993c1d">START sem flags ativas</text>

  <!-- ERROR → IDLE seta lateral esquerda longa -->
  <path d="M240 468 L58 468 L58 90 L240 90" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow-dash)"/>
  <text x="36" y="283" text-anchor="middle" font-size="11" fill="#888780" transform="rotate(-90,36,283)">CMD_CLEAR_ERR → IDLE</text>
</svg>
